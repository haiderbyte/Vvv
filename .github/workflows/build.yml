name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        # قمنا بإزالة سطر الكاش هنا لتفادي خطأ الـ Lock file تماماً
        
    - name: Install Dependencies
      run: npm install
      
    - name: Build Project
      run: npm run build --if-present
