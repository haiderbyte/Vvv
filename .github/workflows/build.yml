name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 1. هذه الخطوة السحرية ستقوم بتوليد ملف الـ jar والـ wrapper الناقصين داخل السيرفر فوراً
    - name: Generate Gradle Wrapper Files
      run: gradle wrapper

    # 2. إعطاء صلاحية التشغيل لملف gradlew الذكي الذي تم توليده
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 3. بناء التطبيق الحقيقي واستخراج الـ APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    # 4. رفع ملف الـ APK لتنزيله مباشرة على تلفونك
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Dazai-Journal-APK
        path: app/build/outputs/apk/debug/app-debug.apk
